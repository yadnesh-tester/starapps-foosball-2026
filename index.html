<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚽ StarApps Fooseball League 2026</title>
<link rel="icon" type="image/png" href="logo.png" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #08081a;
    color: #e8e8e8;
    min-height: 100vh;
    overflow-x: hidden;
  }
  [hidden] { display: none !important; }

  /* ── Stars ── */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; width: 2px; height: 2px;
    background: white; border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    animation-delay: var(--dl, 0s);
    opacity: var(--o, 0.5);
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--o, 0.5); }
    50% { opacity: 0.08; }
  }

  /* ── Shared ── */
  .gold-text {
    background: linear-gradient(90deg, #ffd700, #ff8c35);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .phase { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px; position: relative; z-index: 1; }

  /* ── WAITING ── */
  .site-logo  { width: 72px; height: 72px; border-radius: 16px; object-fit: cover; margin-bottom: 16px; box-shadow: 0 0 24px rgba(255,215,0,0.18); }
  .wait-title { font-size: 2.6rem; font-weight: 900; text-align: center; margin-bottom: 6px; }
  .wait-sub   { text-align: center; color: #8a8aa0; font-size: 0.9rem; margin-bottom: 32px; }

  .cd-ring {
    text-align: center;
    padding: 26px 48px;
    border-radius: 22px;
    border: 2px solid rgba(255,215,0,0.3);
    background: rgba(255,215,0,0.04);
    margin-bottom: 36px;
    animation: ring-pulse 2s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%,100% { border-color: rgba(255,215,0,0.3); box-shadow: none; }
    50%      { border-color: rgba(255,215,0,0.7); box-shadow: 0 0 28px 4px rgba(255,215,0,0.12); }
  }
  #cdTime   { font-size: 3.8rem; font-weight: 900; letter-spacing: 5px; font-variant-numeric: tabular-nums; color: #ffd700; line-height: 1; }
  #cdLabel  { font-size: 0.82rem; color: #8a8aa0; margin-top: 8px; letter-spacing: 1.5px; text-transform: uppercase; }

  .section-label { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 1.8px; color: #6a6a80; font-weight: 700; text-align: center; margin-bottom: 14px; }
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 620px; }
  .chip {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 50px; font-size: 0.88rem; font-weight: 600;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dot-a { background: #ff6b35; }
  .dot-r { background: #ffd700; }
  .dot-d { background: #6ad17a; }
  .chip-role { font-size: 0.7rem; color: #6a6a80; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── DRAWING ── */
  #phase-drawing { background: radial-gradient(ellipse at center, #12123a 0%, #08081a 100%); }

  /* Intro countdown */
  #subphase-intro { text-align: center; }
  .big-num {
    font-size: 14rem; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, #ffd700, #ff6b35);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: num-pop 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes num-pop {
    0% { transform: scale(2); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .intro-label {
    font-size: 1.6rem; font-weight: 800; color: #ffd700;
    letter-spacing: 5px; text-transform: uppercase; margin-top: 12px;
    animation: fade-up 0.4s ease-out;
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Shuffle */
  #subphase-shuffle { width: 100%; max-width: 840px; }
  .shuffle-title {
    text-align: center; font-size: 1.5rem; font-weight: 800;
    letter-spacing: 4px; text-transform: uppercase; color: #ffd700;
    margin-bottom: 6px;
    animation: blink-text 1.1s ease-in-out infinite;
  }
  @keyframes blink-text {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .shuffle-hint { text-align: center; font-size: 0.82rem; color: #6a6a80; margin-bottom: 24px; }

  #arena {
    position: relative; height: 320px; width: 100%; overflow: hidden;
    border-radius: 16px; background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .ball {
    position: absolute; width: 82px; height: 82px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: 700; text-align: center; cursor: default; padding: 6px;
    transition: left 1.3s cubic-bezier(0.45,0,0.55,1), top 1.3s cubic-bezier(0.45,0,0.55,1);
    animation: ball-bob var(--bd, 2s) ease-in-out infinite;
    animation-delay: var(--bdd, 0s);
    z-index: 2;
  }
  .bname { font-size: 0.76rem; font-weight: 800; word-break: break-word; line-height: 1.2; }
  .brole { font-size: 0.58rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 3px; }
  @keyframes ball-bob {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-9px) scale(1.06); }
  }
  .ball.att { background: radial-gradient(circle at 35% 35%, #ff9060, #bb3300); border: 3px solid rgba(255,107,53,0.55); box-shadow: 0 4px 18px rgba(255,107,53,0.38); color: #fff; }
  .ball.rou { background: radial-gradient(circle at 35% 35%, #ffe066, #bb8800); border: 3px solid rgba(255,215,0,0.55); box-shadow: 0 4px 18px rgba(255,215,0,0.38); color: #1a1400; }
  .ball.def { background: radial-gradient(circle at 35% 35%, #7de090, #217a30); border: 3px solid rgba(106,209,122,0.55); box-shadow: 0 4px 18px rgba(106,209,122,0.35); color: #fff; }
  .ball.glow {
    animation: ball-glow 0.4s ease-in-out infinite !important;
    z-index: 10;
  }
  @keyframes ball-glow {
    0%,100% { transform: scale(1.14); box-shadow: 0 0 30px 10px rgba(255,215,0,0.75); }
    50%      { transform: scale(1.22); box-shadow: 0 0 40px 14px rgba(255,215,0,0.9); }
  }

  .shuffle-footer { margin-top: 18px; text-align: center; }
  .shuffle-status { font-size: 0.84rem; color: #8a8aa0; margin-bottom: 8px; }
  .prog-wrap { width: 280px; height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; margin: 0 auto; overflow: hidden; }
  .prog-bar  { height: 100%; background: linear-gradient(90deg, #ffd700, #ff6b35); border-radius: 3px; transition: width 0.8s linear; width: 0%; }

  /* Reveal */
  #subphase-reveal { width: 100%; max-width: 920px; }
  .reveal-title {
    text-align: center; font-size: 1.7rem; font-weight: 900;
    letter-spacing: 3px; text-transform: uppercase;
    background: linear-gradient(90deg, #ffd700, #ff6b35);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 24px;
  }
  .reveal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }

  /* ── Flip cards ── */
  .flip-card { perspective: 1000px; min-height: 168px; }
  .flip-inner {
    width: 100%; min-height: 168px; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-back, .flip-front {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 18px;
  }
  .flip-back {
    background: linear-gradient(135deg, #13133a 0%, #0d0d26 100%);
    border: 2px solid rgba(255,215,0,0.45);
    box-shadow: inset 0 0 40px rgba(255,215,0,0.04), 0 0 18px rgba(255,215,0,0.1);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
  }
  .back-icon  { font-size: 2.2rem; line-height: 1; }
  .back-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,215,0,0.45); font-weight: 700; }
  .back-q     { font-size: 2.4rem; font-weight: 900; color: rgba(255,215,0,0.25); line-height: 1; }
  .flip-front {
    background: linear-gradient(135deg, rgba(255,215,0,0.09), rgba(255,107,53,0.04));
    border: 2px solid rgba(255,215,0,0.45);
    padding: 16px 14px; text-align: center;
    transform: rotateY(180deg);
    display: flex; flex-direction: column; justify-content: center;
    overflow: hidden;
  }
  /* Grand finale — all cards close and reopen */
  .flip-inner.finale-close { transition: transform 0.45s ease-in  !important; }
  .flip-inner.finale-open  { transition: transform 0.45s ease-out !important; }

  .rcard-name { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 1.3px; color: #8a8aa0; font-weight: 700; margin-bottom: 12px; }
  .rmember { padding: 5px 0; }
  .rmember .rp-name { font-size: 1rem; font-weight: 700; color: #e8e8e8; }
  .rdivider { border: none; border-top: 1px solid rgba(255,215,0,0.18); margin: 8px 0; }
  .tbd { font-size: 0.8rem; color: #5a5a70; font-style: italic; margin-top: 6px; }

  /* ── DONE ── */
  #phase-done { background: radial-gradient(ellipse at center, #0f0f30 0%, #08081a 100%); }
  .done-title { font-size: 3rem; font-weight: 900; text-align: center; margin-bottom: 4px; animation: bounce-in 0.7s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes bounce-in { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .done-sub { text-align: center; color: #8a8aa0; margin-bottom: 30px; font-size: 0.9rem; }

  .final-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; max-width: 1020px; width: 100%; }
  .fcard {
    background: linear-gradient(135deg, rgba(255,215,0,0.07), rgba(255,107,53,0.03));
    border: 1px solid rgba(255,215,0,0.22);
    border-radius: 18px; padding: 20px 16px; text-align: center;
  }
  .fcard-name { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 1.3px; color: #8a8aa0; font-weight: 700; margin-bottom: 14px; }
  .fmember { padding: 6px 0; }
  .fmember .fp-name { font-size: 1rem; font-weight: 700; color: #e8e8e8; margin-bottom: 5px; }
  .frole { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.3px; }
  .frole.att { background: rgba(255,107,53,0.18); color: #ff8055; border: 1px solid rgba(255,107,53,0.3); }
  .frole.rou { background: rgba(255,215,0,0.14); color: #ffd700; border: 1px solid rgba(255,215,0,0.28); }
  .frole.def { background: rgba(106,209,122,0.16); color: #6ad17a; border: 1px solid rgba(106,209,122,0.28); }
  .fdivider  { border: none; border-top: 1px solid rgba(255,215,0,0.14); margin: 10px 0; }
  .f-tbd { font-size: 0.78rem; color: #5a5a70; font-style: italic; margin-top: 8px; }
  .done-ts { font-size: 0.76rem; color: #5a5a70; text-align: center; margin-top: 26px; }

  /* Confetti */
  .confetti {
    position: fixed; top: -20px; pointer-events: none; z-index: 999;
    animation: fall linear forwards;
    border-radius: 2px;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(800deg); opacity: 0; }
  }

  /* Flash overlay for reveal moments */
  #flash {
    position: fixed; inset: 0; background: rgba(255,215,0,0.12);
    pointer-events: none; z-index: 50;
    opacity: 0; transition: opacity 0.15s;
  }
  #flash.on { opacity: 1; }

  @media (max-width: 480px) {
    .wait-title { font-size: 1.9rem; }
    #cdTime { font-size: 2.6rem; letter-spacing: 3px; }
    .big-num { font-size: 8rem; }
    #arena { height: 240px; }
    .ball { width: 68px; height: 68px; }
    .bname { font-size: 0.65rem; }
    .reveal-grid, .final-grid { grid-template-columns: 1fr 1fr; }
    .done-title { font-size: 2rem; }
  }
</style>
</head>
<body>

<div id="flash"></div>
<div class="stars" id="stars"></div>

<!-- ══ WAITING ══════════════════════════════════════════ -->
<div id="phase-waiting" class="phase">
  <img src="logo.png" alt="StarApps" class="site-logo" />
  <div class="wait-title gold-text">⚽ StarApps Fooseball League 2026</div>
  <div class="wait-sub">Draw happens at 3:00 PM sharp. See you on the table!</div>

  <div class="cd-ring">
    <div id="cdTime">--:--:--</div>
    <div id="cdLabel">until 3:00 PM</div>
  </div>

  <div class="section-label" style="margin-bottom:14px;">Players</div>
  <div class="chips-wrap" id="chipsWrap"></div>
</div>

<!-- ══ DRAWING ══════════════════════════════════════════ -->
<div id="phase-drawing" class="phase" hidden>

  <!-- 5-4-3-2-1 intro -->
  <div id="subphase-intro">
    <div class="big-num" id="introNum">5</div>
    <div class="intro-label" id="introLabel">GET READY!</div>
  </div>

  <!-- Balls shuffle -->
  <div id="subphase-shuffle" hidden>
    <div class="shuffle-title">🎰 Drawing Teams...</div>
    <div class="shuffle-hint" id="shuffleHint">Picking your fate...</div>
    <div id="arena"></div>
    <div class="shuffle-footer">
      <div class="shuffle-status" id="shuffleStatus">Working on it...</div>
      <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
    </div>
  </div>

  <!-- Team reveals -->
  <div id="subphase-reveal" hidden>
    <div class="reveal-title">🎯 Here we go!</div>
    <div class="reveal-grid" id="revealGrid"></div>
  </div>

</div>

<!-- ══ DONE ═════════════════════════════════════════════ -->
<div id="phase-done" class="phase" hidden>
  <img src="logo.png" alt="StarApps" class="site-logo" />
  <div class="done-title gold-text">🎉 Teams Are Set!</div>
  <div class="done-sub">Good luck out there. May the best team win!</div>
  <div class="final-grid" id="finalGrid"></div>
  <div class="done-ts" id="doneTs"></div>
</div>

<script>
/* ─── Players ────────────────────────────────────────── */
const PLAYERS = [
  { name: "Arun",      role: "att" },
  { name: "Lax",       role: "att" },
  { name: "Shashwat",  role: "rou" },
  { name: "Abhishek",  role: "rou" },
  { name: "Yadnesh",   role: "rou" },
  { name: "Santosh",   role: "def" },
  { name: "Aishwarya", role: "def" },
  { name: "Fahad",     role: "def" },
  { name: "Shashank",  role: "def" },
  { name: "Kashish",   role: "def" },
];
const TEAM_NAMES = ["Strikers", "Blitz", "Dynamo", "Vortex", "Phoenix"];
const DRAW_KEY   = "foosball_draw_3pm_v1";
const DRAW_HOUR  = 15;
const DRAW_MIN   = 0;

const ROLE_LABEL = { att: "⚔️ Attacker", rou: "⭐ All-Rounder", def: "🛡️ Defender" };
const ROLE_SHORT = { att: "Attacker",     rou: "All-Rounder",    def: "Defender" };
const DOT_CLASS  = { att: "dot-a",        rou: "dot-r",          def: "dot-d" };

/* ─── Stars ──────────────────────────────────────────── */
(function() {
  const wrap = document.getElementById("stars");
  for (let i = 0; i < 90; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random() * 100 + "%";
    s.style.top  = Math.random() * 100 + "%";
    s.style.setProperty("--d",  (2 + Math.random() * 4) + "s");
    s.style.setProperty("--dl", (Math.random() * 5) + "s");
    s.style.setProperty("--o",  (0.15 + Math.random() * 0.7).toFixed(2));
    wrap.appendChild(s);
  }
})();

/* ─── Seeded RNG ─────────────────────────────────────────
   Seed = today's draw date so EVERY browser produces the
   exact same shuffle — no backend needed for shared results.
──────────────────────────────────────────────────────── */
function makePrng(seed) {
  // Mulberry32 — fast, uniform, deterministic
  return function() {
    seed |= 0;
    seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function getDaySeed() {
  const d = new Date();
  // Unique integer per calendar day
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

const rng = makePrng(getDaySeed());

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function show(id) { document.getElementById(id).hidden = false; }
function hide(id) { document.getElementById(id).hidden = true; }

/* ─── Compute draw ───────────────────────────────────── */
function computeDraw() {
  return [
    { teamName: "Phoenix",  members: [{ name: "Abhishek",  role: "rou" }, { name: "Shashank",  role: "def" }] },
    { teamName: "Dynamo",   members: [{ name: "Lax",       role: "att" }, { name: "Santosh",   role: "def" }] },
    { teamName: "Blitz",    members: [{ name: "Kashish",   role: "rou" }, { name: "Fahad",     role: "def" }] },
    { teamName: "Strikers", members: [{ name: "Yadnesh",   role: "def" }, { name: "Shashwat",  role: "rou" }] },
    { teamName: "Vortex",   members: [{ name: "Arun",      role: "att" }, { name: "Aishwarya", role: "def" }] },
  ];
}

/* ─── Flash overlay ──────────────────────────────────── */
function flash() {
  const el = document.getElementById("flash");
  el.classList.add("on");
  setTimeout(() => el.classList.remove("on"), 180);
}

/* ─── Confetti ───────────────────────────────────────── */
function launchConfetti(count = 70) {
  const colors = ["#ffd700","#ff6b35","#6ad17a","#a07aff","#ff7ab8","#ffffff","#5af0ff"];
  for (let i = 0; i < count; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.style.left = Math.random() * 100 + "vw";
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width  = (5 + Math.random() * 9) + "px";
    el.style.height = (5 + Math.random() * 9) + "px";
    el.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
    el.style.animationDuration = (2.5 + Math.random() * 3) + "s";
    el.style.animationDelay    = (Math.random() * 2.5) + "s";
    document.body.appendChild(el);
    el.addEventListener("animationend", () => el.remove());
  }
}

/* ─── Participants chips ─────────────────────────────── */
function renderChips() {
  document.getElementById("chipsWrap").innerHTML = PLAYERS.map(p => `
    <div class="chip">
      <div class="dot ${DOT_CLASS[p.role]}"></div>
      <span>${p.name}</span>
      <span class="chip-role">${ROLE_SHORT[p.role]}</span>
    </div>`).join("");
}

/* ─── Countdown ──────────────────────────────────────── */
function drawDeadline() {
  const t = new Date(); t.setHours(DRAW_HOUR, DRAW_MIN, 0, 0); return t;
}
let cdInterval = null;
function startCountdown(onFire) {
  function tick() {
    const diff = drawDeadline() - Date.now();
    if (diff <= 30000) {
      document.getElementById("cdTime").textContent = "00:00:00";
      clearInterval(cdInterval);
      onFire();
      return;
    }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById("cdTime").textContent =
      `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }
  tick();
  cdInterval = setInterval(tick, 1000);
}

/* ─── Done phase ─────────────────────────────────────── */
function showDone(teams, ts) {
  hide("phase-waiting");
  hide("phase-drawing");
  show("phase-done");

  document.getElementById("finalGrid").innerHTML = teams.map(t => {
    const membersHTML = t.members.map((m, i) => `
      ${i > 0 ? '<hr class="fdivider">' : ""}
      <div class="fmember">
        <div class="fp-name">${m.name}</div>
        <div class="frole ${m.role}">${ROLE_LABEL[m.role]}</div>
      </div>`).join("") + (t.members.length < 2 ? '<div class="f-tbd">Partner TBD</div>' : "");
    return `<div class="fcard"><div class="fcard-name">${t.teamName}</div>${membersHTML}</div>`;
  }).join("");

  if (ts) {
    const d = new Date(ts);
    document.getElementById("doneTs").textContent =
      `Drawn at ${d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })} · ${d.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" })}`;
  }
  setTimeout(() => launchConfetti(80), 300);
  setTimeout(() => launchConfetti(60), 2200);
  setTimeout(() => launchConfetti(50), 4000);
}

/* ─── Draw sequence (60 seconds) ────────────────────── */
function runDraw(teams) {
  hide("phase-waiting");
  show("phase-drawing");

  /* Phase 1 — Intro countdown: 5 4 3 2 1 GO (6 × 0.9s = 5.4s + 0.6s gap = 6s) */
  const steps = [
    { num: "5", label: "GET READY!" },
    { num: "4", label: "GET READY!" },
    { num: "3", label: "HERE WE GO!" },
    { num: "2", label: "HERE WE GO!" },
    { num: "1", label: "DRAW TIME!" },
    { num: "🎰", label: "LET'S GO!" },
  ];
  let si = 0;
  function stepIntro() {
    const el = document.getElementById("introNum");
    el.textContent = steps[si].num;
    document.getElementById("introLabel").textContent = steps[si].label;
    el.style.animation = "none"; void el.offsetWidth; el.style.animation = "num-pop 0.35s cubic-bezier(0.34,1.56,0.64,1)";
    si++;
    if (si < steps.length) setTimeout(stepIntro, 900);
    else setTimeout(beginShuffle, 600);
  }
  stepIntro();

  /* Phase 2 — Shuffle (37 seconds) */
  function beginShuffle() {
    hide("subphase-intro");
    show("subphase-shuffle");

    const arena = document.getElementById("arena");
    const balls = [];

    function arenaW() { return arena.offsetWidth  || 500; }
    function arenaH() { return arena.offsetHeight || 320; }
    const ballSize = window.innerWidth < 480 ? 68 : 82;

    // Create balls
    arena.innerHTML = "";
    PLAYERS.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = `ball ${p.role}`;
      div.style.setProperty("--bd",  (1.85 + i * 0.08) + "s");
      div.style.setProperty("--bdd", (Math.random() * 1.5) + "s");
      div.innerHTML = `<div class="bname">${p.name}</div><div class="brole">${ROLE_SHORT[p.role]}</div>`;
      div.style.left = (8 + Math.random() * (arenaW() - ballSize - 16)) + "px";
      div.style.top  = (8 + Math.random() * (arenaH() - ballSize - 16)) + "px";
      arena.appendChild(div);
      balls.push(div);
    });

    function scatter() {
      const W = arenaW(), H = arenaH();
      balls.forEach(b => {
        b.style.left = (8 + Math.random() * (W - ballSize - 16)) + "px";
        b.style.top  = (8 + Math.random() * (H - ballSize - 16)) + "px";
      });
    }
    const scatterTimer = setInterval(scatter, 1300);

    // Highlight random pairs briefly
    function flashPair() {
      balls.forEach(b => b.classList.remove("glow"));
      const i1 = Math.floor(Math.random() * balls.length);
      let i2   = Math.floor(Math.random() * balls.length);
      if (i2 === i1) i2 = (i2 + 1) % balls.length;
      balls[i1].classList.add("glow");
      balls[i2].classList.add("glow");
      setTimeout(() => {
        balls[i1]?.classList.remove("glow");
        balls[i2]?.classList.remove("glow");
      }, 550);
    }
    const pairTimer = setInterval(flashPair, 1700);

    // Progress bar + hint messages
    const hints = [
      "Let's go...",
      "No peeking...",
      "This is taking forever lol...",
      "Almost there...",
      "Ok for real this time...",
      "Locking it in...",
    ];
    const SHUFFLE_MS = 20000;
    const t0 = Date.now();
    const progInterval = setInterval(() => {
      const pct = Math.min(((Date.now() - t0) / SHUFFLE_MS) * 100, 100);
      document.getElementById("progBar").style.width = pct + "%";
      document.getElementById("shuffleStatus").textContent =
        hints[Math.min(Math.floor((pct / 100) * hints.length), hints.length - 1)];

    }, 600);

    setTimeout(() => {
      clearInterval(scatterTimer);
      clearInterval(pairTimer);
      clearInterval(progInterval);
      balls.forEach(b => b.classList.remove("glow"));
      document.getElementById("progBar").style.width = "100%";
      document.getElementById("shuffleStatus").textContent = "Done. Check your team!";
      setTimeout(beginReveal, 900);
    }, SHUFFLE_MS);
  }

  /* Phase 3 — Flip-card reveal: all spawn face-down, flip one by one, grand finale */
  function beginReveal() {
    hide("subphase-shuffle");
    show("subphase-reveal");

    const grid = document.getElementById("revealGrid");
    grid.innerHTML = "";

    function cardFrontHTML(team) {
      return `<div class="rcard-name">${team.teamName}</div>`
        + team.members.map((m, mi) => `
          ${mi > 0 ? '<hr class="rdivider">' : ""}
          <div class="rmember"><div class="rp-name">${m.name}</div></div>`).join("")
        + (team.members.length < 2 ? '<div class="tbd">Partner TBD</div>' : "");
    }

    // Spawn all cards face-down simultaneously
    const cardEls = teams.map(team => {
      const wrapper = document.createElement("div");
      wrapper.className = "flip-card";
      wrapper.innerHTML = `
        <div class="flip-inner">
          <div class="flip-back">
            <div class="back-icon">⚽</div>
            <div class="back-label">StarApps FL 2026</div>
            <div class="back-q">?</div>
          </div>
          <div class="flip-front">${cardFrontHTML(team)}</div>
        </div>`;
      grid.appendChild(wrapper);
      return wrapper;
    });

    const FLIP_INTERVAL = 3000;
    const FLIP_DELAY   = 1500; // pause so all 5 face-down cards are seen before first flip

    cardEls.forEach((card, i) => {
      setTimeout(() => {
        flash();
        // Close the previous card when the new one opens
        if (i > 0) cardEls[i - 1].classList.remove("flipped");
        card.classList.add("flipped");

        // After the last card, run the grand finale
        if (i === cardEls.length - 1) {
          setTimeout(() => {
            // All cards close simultaneously with fast-in transition
            cardEls.forEach(c => {
              c.querySelector(".flip-inner").classList.add("finale-close");
              c.classList.remove("flipped");
            });

            // Wait for close (450ms) + buffer, then reopen all at once
            setTimeout(() => {
              cardEls.forEach(c => {
                const inner = c.querySelector(".flip-inner");
                inner.classList.remove("finale-close");
                inner.classList.add("finale-open");
              });

              // Double rAF flushes layout before flipping back
              requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                  cardEls.forEach(c => c.classList.add("flipped"));
                  launchConfetti(70);

                  setTimeout(() => {
                    const ts = Date.now();
                    // Only persist the real draw — test mode must never overwrite saved results
                    if (!isTest) {
                      try { localStorage.setItem(DRAW_KEY, JSON.stringify({ teams, ts, date: new Date().toDateString() })); } catch (e) {}
                    }
                    setTimeout(() => showDone(teams, ts), 900);
                  }, 900);
                });
              });
            }, 700);
          }, 1800); // show last card for 1.8s before grand finale
        }
      }, FLIP_DELAY + i * FLIP_INTERVAL);
    });
  }
}

/* ─── Init ───────────────────────────────────────────── */
renderChips();

// Always show the finalised draw result immediately
const teams = computeDraw();
const ts = Date.now();
try { localStorage.setItem(DRAW_KEY, JSON.stringify({ teams, ts, date: new Date().toDateString() })); } catch (e) {}
showDone(teams, ts);
</script>
